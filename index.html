<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🅿️AKISTANI COMPANIES</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 500px; 
            margin: 40px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { 
            text-align: center; 
            color: #2c3e50; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px; 
            margin-top: 0;
        }
        .input-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            font-size: 0.9em; 
            color: #555;
        }
        select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1em; 
            background-color: #fff;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🅿️AKISTANI COMPANIES</h2>

    <div class="input-group">
        <label for="car-make">MAKE</label>
        <select id="car-make" onchange="updateModels()">
            <option value="">Select Manufacturer</option>
            <option value="Toyota">Toyota (Indus Motors)</option>
            <option value="Honda">Honda Atlas</option>
            <option value="Suzuki">Suzuki Pakistan</option>
            <option value="Kia">Kia Lucky Motors</option>
            <option value="Hyundai">Hyundai Nishat</option>
            <option value="Changan">Changan Pakistan</option>
            <option value="MG">MG Motors</option>
        </select>
    </div>

    <div class="input-group">
        <label for="car-model">MODEL</label>
        <select id="car-model">
            <option value="">Please select a make first</option>
        </select>
    </div>
</div>

<script>
    // Data object containing Pakistani car models
    const carData = {
        "Toyota": ["Corolla", "Yaris", "Corolla Cross (Hybrid)", "Fortuner", "Hilux Revo", "Land Cruiser", "Camry"],
        "Honda": ["Civic", "City", "HR-V", "BR-V", "Accord"],
        "Suzuki": ["Alto", "Cultus", "Swift", "Wagon R", "Every", "Jimny", "Fronx"],
        "Kia": ["Sportage", "Picanto", "Stonic", "Sorento", "Carnival"],
        "Hyundai": ["Tucson", "Elantra", "Sonata", "Santa Fe", "Porter H-100"],
        "Changan": ["Alsvin", "Oshan X7", "Karvaan", "M9 Sherpa"],
        "MG": ["HS", "ZS", "MG 3", "MG 4 (EV)", "MG GT"]
    };

    function updateModels() {
        const makeSelect = document.getElementById("car-make");
        const modelSelect = document.getElementById("car-model");
        const selectedMake = makeSelect.value;

        // Clear existing options
        modelSelect.innerHTML = '<option value="">Select Model</option>';

        if (selectedMake && carData[selectedMake]) {
            carData[selectedMake].forEach(model => {
                let option = document.createElement("option");
                option.value = model.toLowerCase().replace(/\s+/g, '-');
                option.text = model;
                modelSelect.appendChild(option);
            });
        } else {
            modelSelect.innerHTML = '<option value="">Please select a make first</option>';
        }
    }
</script>

</body>
</html>
