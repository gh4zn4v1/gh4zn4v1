<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CAR MODS PAKISTAN</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 650px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85em; color: #555; }
        select { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; 
            font-size: 0.95em; background-color: #fff; cursor: pointer;
        }

        /* Modifications Table Styling */
        .mods-section { margin-top: 30px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; border-radius: 4px 4px 0 0; }
        .mod-category { font-weight: bold; color: #2c3e50; width: 30%; }
        .mod-list { color: #555; font-size: 0.9em; }
        .status-badge { 
            background: #27ae60; color: white; padding: 2px 8px; 
            border-radius: 10px; font-size: 0.75em; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🅿️AKISTANI CAR MODS</h2>

    <div class="form-grid">
        <div class="input-group">
            <label>MAKE</label>
            <select id="car-make" onchange="updateModels()">
                <option value="">Manufacturer</option>
                <option value="Toyota">Toyota</option>
                <option value="Honda">Honda</option>
                <option value="Suzuki">Suzuki</option>
                <option value="Kia">Kia</option>
                <option value="Hyundai">Hyundai</option>
                <option value="Changan">Changan</option>
                <option value="MG">MG</option>
            </select>
        </div>

        <div class="input-group">
            <label>MODEL</label>
            <select id="car-model" onchange="showMods()">
                <option value="">Select Make First</option>
            </select>
        </div>

        <div class="input-group">
            <label>YEAR</label>
            <select id="car-year">
                </select>
        </div>
    </div>

    <div id="mods-section" class="mods-section">
        <h3 id="selected-car-title" style="color: #3498db; font-size: 1.1em;">Available Mods</h3>
        <table>
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Popular Upgrades</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="mods-body">
                </tbody>
        </table>
    </div>
</div>
